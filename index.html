<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Produto</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo">
                <h2>Loja</h2>
            </div>
            <nav class="menu">
                <div class="menu-item">
                    <span></span> Produtos
                </div>
                <div class="menu-item">
                    <span></span> Carrinho de compras
                </div>
                <div class="menu-item active">
                    <span></span> Adicionar Produtos
                </div>
            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <!-- WELCOME -->
            <div class="welcome">
                <h1>Bem-vindo(a)!</h1>
            </div>

            <!-- FORMULÁRIO DE ADICIONAR PRODUTO -->
            <div class="form-container">
                <h2>➕ Adicionar novo produto</h2>
                <form id="productForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>NOME DO PRODUTO *</label>
                            <input type="text" id="productName" placeholder="Ex: Smartwatch Series 899 X" required>
                        </div>
                        <div class="form-group">
                            <label>PREÇO (MZM) *</label>
                            <input type="number" id="productPrice" placeholder="Ex: 2450" step="0.01" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>CATEGORIA *</label>
                            <select id="productCategory" required>
                                <option value="">Selecione uma categoria</option>
                                <option value="Eletrônicos">📱 Eletrônicos</option>
                                <option value="Acessórios">💍 Acessórios</option>
                                <option value="Roupas">👕 Roupas</option>
                                <option value="Casa e Decoração">🏠 Casa e Decoração</option>
                                <option value="Esportes">⚽ Esportes</option>
                                <option value="Livros">📚 Livros</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>STATUS</label>
                            <div class="status-options">
                                <label class="status-option">
                                    <input type="radio" name="status" value="ativo" checked> 🟢 ATIVO
                                </label>
                                <label class="status-option">
                                    <input type="radio" name="status" value="pausado"> 🔴 PAUSADO
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label>DESCRIÇÃO DO PRODUTO</label>
                        <textarea id="productDescription" rows="4" placeholder="Descreva o produto..."></textarea>
                    </div>

                    <button type="submit" class="btn-submit">Adicionar Produto</button>
                </form>
            </div>
        </main>
    </div>

    <!-- TOAST NOTIFICATION -->
    <div id="toast" class="toast"></div>

    <script src="models/ProductModel.js"></script>
    <script src="views/ProductView.js"></script>
    <script src="controllers/ProductController.js"></script>

    <script>
        // Inicialização
        document.addEventListener('DOMContentLoaded', () => {
            const productView = new ProductView();
            const productController = new ProductController(productView);
            productController.init();
        });
    </script>
</body>
</html>
