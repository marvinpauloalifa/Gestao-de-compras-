<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão - Loja</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <h2>Loja</h2>
            </div>
            <nav class="menu">
                <div class="menu-item" id="menu-lista">
                    <span>📦</span> Produtos
                </div>
                <div class="menu-item" id="menu-carrinho">
                    <span>🛒</span> Carrinho de compras
                    <span id="badge-carrinho" style="
                        display:none;
                        background:#e74c3c;
                        color:white;
                        border-radius:50%;
                        font-size:0.7rem;
                        padding:2px 7px;
                        margin-left:auto;
                        font-weight:700;
                    "></span>
                </div>
                <div class="menu-item active" id="menu-adicionar">
                    <span>➕</span> Adicionar Produtos
                </div>
            </nav>
        </aside>

        <main class="main-content">
            <div class="welcome">
                <h1>Bem-vindo(a)!</h1>
            </div>

            <section id="section-form">
                <div class="form-container">
                    <h2 id="form-title">➕ Adicionar novo produto</h2>
                    <form id="productForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label>NOME DO PRODUTO *</label>
                                <input type="text" id="productName" placeholder="Ex: Smartwatch Series 899 X" required>
                            </div>
                            <div class="form-group">
                                <label>PREÇO (MZM) *</label>
                                <input type="number" id="productPrice" placeholder="Ex: 2450" step="0.01" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>CATEGORIA *</label>
                                <select id="productCategory" required>
                                    <option value="">Selecione uma categoria</option>
                                    <option value="Eletrônicos">📱 Eletrônicos</option>
                                    <option value="Acessórios">💍 Acessórios</option>
                                    <option value="Roupas">👕 Roupas</option>
                                    <option value="Casa e Decoração">🏠 Casa e Decoração</option>
                                    <option value="Esportes">⚽ Esportes</option>
                                    <option value="Livros">📚 Livros</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>STATUS</label>
                                <div class="status-options">
                                    <label class="status-option">
                                        <input type="radio" name="status" value="ativo" checked> 🟢 ATIVO
                                    </label>
                                    <label class="status-option">
                                        <input type="radio" name="status" value="pausado"> 🔴 PAUSADO
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div class="form-group full-width">
                            <label>DESCRIÇÃO DO PRODUTO</label>
                            <textarea id="productDescription" rows="4" placeholder="Descreva o produto..."></textarea>
                        </div>

                        <button type="submit" class="btn-submit" id="btn-submit-text">Adicionar Produto</button>
                    </form>
                </div>
            </section>

            <section id="section-list" style="display: none;">
                <div class="form-container">
                    <h2>📦 Lista de Produtos Cadastrados</h2>
                    <div id="lista-container"></div>
                </div>
            </section>

            <section id="section-carrinho" style="display: none;">
                <div class="form-container">
                    <h2>🛒 Carrinho de Compras</h2>
                    <div id="carrinho-container"></div>
                </div>
            </section>
        </main>
    </div>

    <div id="toast" class="toast"></div>

    <script src="models/ProductModel.js"></script>
    <script src="models/CarrinhoModel.js"></script>
    <script src="views/ProductView.js"></script>
    <script src="views/CarrinhoView.js"></script>
    <script src="Controllers/ProductController.js"></script>
    <script src="Controllers/CarrinhoController.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const productView = new ProductView();
            const productController = new ProductController(productView);

            const carrinhoModel = new CarrinhoModel();
            const carrinhoView = new CarrinhoView();
            const carrinhoController = new CarrinhoController(carrinhoModel, carrinhoView, productController);

            productController.carrinhoController = carrinhoController;

            productController.init();
            carrinhoController.init();
        });
    </script>
</body>
</html>
